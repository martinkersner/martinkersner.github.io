{{ define "head" }}
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [ ['$','$'], ["\\(","\\)"] ],
        processEscapes: true
      }
    });
  </script>
  <script type="text/javascript" async
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
  </script>
{{ end }}

{{ define "main" }}
  <section id="main-content" class="container content-section" style="height: 100%; overflow: visible;">
    <div class="row">
      <div id="post" class="col-lg-12">
        <h1>{{ .Title }}</h1>
        <span id="date">{{ .Date.Format "January 2, 2006" }}</span>
        {{ .Content }}

      </div>
    </div>
  </section>
{{ end }}
